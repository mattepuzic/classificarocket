<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Rocket League</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .squadra-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #38bdf8;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }
        /* Nascondi gli slot giocatori extra inizialmente */
        .slot-opzionale { display: none; }

        .btn-salva {
            width: 100%;
            padding: 15px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-salva:hover { background-color: #059669; }
        
        .mode-selector {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid #38bdf8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Pannello Admin Rocket League</h1>

    <div class="admin-container">
        <div class="mode-selector">
            <div class="form-group">
                <label style="color:#fff; font-size:1.1rem;">👉 Seleziona Modalità di Gioco:</label>
                <select id="modalita-selezionata">
                    <option value="1vs1">1 vs 1 (I=20)</option>
                    <option value="1vs2">1 vs 2 (I=30, H=+200)</option>
                    <option value="2vs1">2 vs 1 (I=30, H=+200)</option>
                    <option value="2vs2" selected>2 vs 2 (I=40)</option>
                    <option value="2vs3">2 vs 3 (I=50, H=+150)</option>
                    <option value="3vs2">3 vs 2 (I=50, H=+150)</option>
                    <option value="3vs3">3 vs 3 (I=60)</option>
                </select>
            </div>
        </div>

        <form id="form-partita">
            <div class="squadra-box">
                <h3 id="label-sq1">🔵 Squadra 1</h3>
                <div class="form-group" id="f-sq1-g1">
                    <label>Giocatore 1:</label>
                    <select id="sq1-g1" required><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group slot-opzionale" id="f-sq1-g2">
                    <label>Giocatore 2:</label>
                    <select id="sq1-g2"><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group slot-opzionale" id="f-sq1-g3">
                    <label>Giocatore 3:</label>
                    <select id="sq1-g3"><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group">
                    <label>Gol Segnati:</label>
                    <input type="number" id="gol1" min="0" value="0" required>
                </div>
            </div>

            <div class="squadra-box">
                <h3 id="label-sq2">🔴 Squadra 2</h3>
                <div class="form-group" id="f-sq2-g1">
                    <label>Giocatore 1:</label>
                    <select id="sq2-g1" required><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group slot-opzionale" id="f-sq2-g2">
                    <label>Giocatore 2:</label>
                    <select id="sq2-g2"><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group slot-opzionale" id="f-sq2-g3">
                    <label>Giocatore 3:</label>
                    <select id="sq2-g3"><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group">
                    <label>Gol Segnati:</label>
                    <input type="number" id="gol2" min="0" value="0" required>
                </div>
            </div>

            <button type="submit" class="btn-salva">💾 Registra Partita</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqdkXgmsURF8MGchtfRJnODJz-olwYfw8",
            authDomain: "classifica-a16c1.firebaseapp.com",
            projectId: "classifica-a16c1",
            storageBucket: "classifica-a16c1.firebasestorage.app",
            messagingSenderId: "724863537613",
            appId: "1:724863537613:web:5c41a3eef6aa6adf7b3484",
            measurementId: "G-MM9P5H2LM5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaGiocatori = [];

        // Gestione visibilità slot in base alla modalità
        const modeSel = document.getElementById('modalita-selezionata');
        function aggiornaInterfaccia() {
            const mode = modeSel.value; // es "1vs2"
            const [n1, n2] = mode.split('vs').map(Number);

            // Reset visibilità
            for(let i=1; i<=3; i++) {
                document.getElementById(`f-sq1-g${i}`).style.display = i <= n1 ? 'block' : 'none';
                document.getElementById(`sq1-g${i}`).required = i <= n1;
                document.getElementById(`f-sq2-g${i}`).style.display = i <= n2 ? 'block' : 'none';
                document.getElementById(`sq2-g${i}`).required = i <= n2;
            }
        }
        modeSel.addEventListener('change', aggiornaInterfaccia);

        // Carica giocatori
        async function popolaSelect() {
            const q = query(collection(db, "giocatori"), where("gioco", "==", "fifa_24"));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const data = d.data();
                data.idDoc = d.id;
                listaGiocatori.push(data);
            });

            const selects = ['sq1-g1', 'sq1-g2', 'sq1-g3', 'sq2-g1', 'sq2-g2', 'sq2-g3'];
            selects.forEach(sId => {
                const el = document.getElementById(sId);
                listaGiocatori.forEach(g => {
                    el.innerHTML += `<option value="${g.nome}">${g.nome} (${g.punti} pt)</option>`;
                });
            });
            aggiornaInterfaccia();
        }

        // Calcolo Delta WFER con le nuove regole Logiche
        function calcolaPunti(sq1Objs, sq2Objs, gol1, gol2, mode) {
            const num1 = sq1Objs.length;
            const num2 = sq2Objs.length;

            const me1Reale = sq1Objs.reduce((a, g) => a + g.punti, 0) / num1;
            const me2Reale = sq2Objs.reduce((a, g) => a + g.punti, 0) / num2;

            let I = 40; 
            let H1 = 0, H2 = 0;

            // Configurazione basata sul menu a tendina
            switch(mode) {
                case "1vs1": I = 20; break;
                case "1vs2": I = 30; H2 = 200; break;
                case "2vs1": I = 30; H1 = 200; break;
                case "2vs2": I = 40; break;
                case "2vs3": I = 50; H2 = 150; break;
                case "3vs2": I = 50; H1 = 150; break;
                case "3vs3": I = 60; break;
            }

            const me1Virtuale = me1Reale + H1;
            const me2Virtuale = me2Reale + H2;

            const diff = me2Virtuale - me1Virtuale;
            const We1 = 1 / (1 + Math.pow(10, diff / 600));
            const We2 = 1 - We1;

            let W1 = 0.5, W2 = 0.5;
            if (gol1 > gol2) { W1 = 1; W2 = 0; }
            else if (gol2 > gol1) { W1 = 0; W2 = 1; }

            const deltaSq1 = Math.round((I * (W1 - We1)) * 10) / 10;
            const deltaSq2 = Math.round((I * (W2 - We2)) * 10) / 10;

            return { deltaSq1, deltaSq2 };
        }

        document.getElementById('form-partita').addEventListener('submit', async (e) => {
            e.preventDefault();

            const mode = modeSel.value;
            const [n1, n2] = mode.split('vs').map(Number);

            const nomiSq1 = [];
            for(let i=1; i<=n1; i++) nomiSq1.push(document.getElementById(`sq1-g${i}`).value);
            const nomiSq2 = [];
            for(let i=1; i<=n2; i++) nomiSq2.push(document.getElementById(`sq2-g${i}`).value);

            const gol1 = parseInt(document.getElementById('gol1').value);
            const gol2 = parseInt(document.getElementById('gol2').value);

            const sq1Objs = listaGiocatori.filter(g => nomiSq1.includes(g.nome));
            const sq2Objs = listaGiocatori.filter(g => nomiSq2.includes(g.nome));

            const res = calcolaPunti(sq1Objs, sq2Objs, gol1, gol2, mode);

            const oggi = new Date().toISOString().split('T')[0];

            // 1. Salva Partita
            await addDoc(collection(db, "partite"), {
                gioco: "fifa_24",
                squadra1: nomiSq1.join(", "),
                squadra2: nomiSq2.join(", "),
                listaSq1: nomiSq1,
                listaSq2: nomiSq2,
                gol1, gol2,
                deltaSq1: res.deltaSq1,
                deltaSq2: res.deltaSq2,
                modalita: mode,
                data: oggi,
                timestamp: Date.now()
            });

            // 2. Aggiorna Giocatori
            for (const g of sq1Objs) {
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: Math.round((g.punti + res.deltaSq1) * 10) / 10,
                    ultimaVariazione: res.deltaSq1
                });
            }
            for (const g of sq2Objs) {
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: Math.round((g.punti + res.deltaSq2) * 10) / 10,
                    ultimaVariazione: res.deltaSq2
                });
            }

            alert(`Successo! Modalità: ${mode}\nDelta Squadra 1: ${res.deltaSq1}\nDelta Squadra 2: ${res.deltaSq2}`);
            location.reload();
        });

        popolaSelect();
    </script>
</body>
</html>
