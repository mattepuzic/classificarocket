<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Admin - Rocket League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-box" class="card card-larga" style="margin-top: 50px; text-align: center;">
        <h1>🔒 Accesso Amministratore</h1>
        <p>Inserisci la password per accedere:</p>
        <div style="margin: 20px 0;">
            <input type="password" id="pass-input" placeholder="Password Admin" style="padding: 12px; width: 80%; max-width: 300px;">
        </div>
        <button id="btn-login">Accedi</button>
        <p id="errore-msg" class="testo-rosso" style="display: none; margin-top: 15px;">Password errata!</p>
        <div style="margin-top: 25px;">
            <a href="index.html" class="btn-link">⬅️ Torna al Sito</a>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <h1>⚙️ Pannello Amministratore (Rocket League)</h1>

        <div class="card card-larga">
            <h2>🚀 Registra Nuova Partita</h2>
            
            <div style="margin-bottom: 20px; text-align: center;">
                <label for="admin-modalita"><strong>Modalità di Gioco:</strong></label><br>
                <select id="admin-modalita" style="margin-top: 5px; padding: 10px; width: 100%; max-width: 300px;">
                    <option value="1vs1">1 vs 1 (I = 20)</option>
                    <option value="2vs2">2 vs 2 (I = 40)</option>
                    <option value="3vs3">3 vs 3 (I = 60)</option>
                </select>
            </div>

            <div style="margin-bottom: 20px; text-align: center;">
                <label for="data-partita"><strong>Data Partita:</strong></label><br>
                <input type="date" id="data-partita" style="margin-top: 5px; padding: 8px;">
            </div>

            <div id="griglia-sfida" style="margin: 25px 0;">
                </div>

            <div style="margin-top: 25px; text-align: center;">
                <button id="btn-salva-partita" style="font-size: 1.1rem; padding: 12px 25px;">🚀 Registra Partita e Calcola Punti</button>
            </div>
        </div>

        <div class="card card-larga">
            <h2>➕ Aggiungi / Modifica Giocatore</h2>
            <input type="text" id="nome-giocatore" placeholder="Nome Giocatore">
            <input type="number" step="any" id="punti-giocatore" placeholder="Punti WFER Iniziali (es. 1000)">
            <button id="btn-salva-giocatore">Salva Giocatore</button>
        </div>

        <div style="margin: 30px 0 50px 0; text-align: center;">
            <a href="index.html" class="btn-link">⬅️ Torna alla Classifica Generale</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqdkXgmsURF8MGchtfRJnODJz-olwYfw8",
            authDomain: "classifica-a16c1.firebaseapp.com",
            projectId: "classifica-a16c1",
            storageBucket: "classifica-a16c1.firebasestorage.app",
            messagingSenderId: "724863537613",
            appId: "1:724863537613:web:5c41a3eef6aa6adf7b3484",
            measurementId: "G-MM9P5H2LM5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PASSWORD_CORRETTA = "Mattefiore61";
        let giocatoriSalvati = [];

        document.getElementById('btn-login').addEventListener('click', verificaPassword);
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificaPassword();
        });

        async function verificaPassword() {
            if (document.getElementById('pass-input').value === PASSWORD_CORRETTA) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                await caricaListaGiocatori();
                generaGrigliaForm();
            } else {
                document.getElementById('errore-msg').style.display = 'block';
            }
        }

        document.getElementById('data-partita').valueAsDate = new Date();
        document.getElementById('admin-modalita').addEventListener('change', generaGrigliaForm);

        async function caricaListaGiocatori() {
            giocatoriSalvati = [];
            const q = query(collection(db, "giocatori"), where("gioco", "==", "fifa_24"));
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach(docSnap => {
                giocatoriSalvati.push(docSnap.data().nome);
            });
            giocatoriSalvati.sort();
        }

        function generaGrigliaForm() {
            const modalita = document.getElementById('admin-modalita').value;
            const numRighe = modalita === '1vs1' ? 1 : (modalita === '2vs2' ? 2 : 3);
            const container = document.getElementById('griglia-sfida');

            let optionsHTML = '<option value="">-- Seleziona --</option>';
            giocatoriSalvati.forEach(g => {
                optionsHTML += `<option value="${g}">${g}</option>`;
            });

            let html = `
                <table style="width: 100%; text-align: center; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Squadra 1 (Giocatore)</th>
                            <th style="width: 12%;">Gol</th>
                            <th style="width: 6%;">VS</th>
                            <th style="width: 12%;">Gol</th>
                            <th style="width: 35%;">Squadra 2 (Giocatore)</th>
                        </tr>
                    </thead>
                    <tbody>`;

            for (let i = 0; i < numRighe; i++) {
                html += `
                    <tr>
                        <td style="padding: 8px;">
                            <select class="select-sq1" style="width: 100%; padding: 8px;">${optionsHTML}</select>
                        </td>
                        <td style="padding: 8px;">
                            <input type="number" class="gol-sq1" min="0" value="0" style="width: 60px; text-align: center; padding: 6px;">
                        </td>
                        <td style="font-weight: bold; font-size: 1.2rem; color: #f43f5e;">VS</td>
                        <td style="padding: 8px;">
                            <input type="number" class="gol-sq2" min="0" value="0" style="width: 60px; text-align: center; padding: 6px;">
                        </td>
                        <td style="padding: 8px;">
                            <select class="select-sq2" style="width: 100%; padding: 8px;">${optionsHTML}</select>
                        </td>
                    </tr>`;
            }

            // RIGA TOTALE GOL (Per quando non si conoscono i gol singoli)
            html += `
                <tr style="border-top: 2px solid #334155; background-color: rgba(255,255,255,0.03);">
                    <td style="padding: 10px; text-align: right; font-weight: bold; color: #10b981;">TOTALE SQUADRA 1:</td>
                    <td style="padding: 10px;">
                        <input type="number" id="totale-gol-sq1" min="0" value="0" style="width: 65px; text-align: center; padding: 6px; font-weight: bold; border: 1px solid #10b981;">
                    </td>
                    <td></td>
                    <td style="padding: 10px;">
                        <input type="number" id="totale-gol-sq2" min="0" value="0" style="width: 65px; text-align: center; padding: 6px; font-weight: bold; border: 1px solid #10b981;">
                    </td>
                    <td style="padding: 10px; text-align: left; font-weight: bold; color: #10b981;">: TOTALE SQUADRA 2</td>
                </tr>`;

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        async function distribuisciGolAutomatici(listaGiocatori, golTotali) {
            const mappaGol = {};
            if (listaGiocatori.length === 0 || golTotali <= 0) return mappaGol;

            const datiMarcatori = [];
            for (const nome of listaGiocatori) {
                const snap = await getDoc(doc(db, "marcatori", `fifa_24_${nome}`));
                const golAttuali = snap.exists() ? snap.data().gol : 0;
                datiMarcatori.push({ nome, golAttuali });
            }

            datiMarcatori.sort((a, b) => a.golAttuali - b.golAttuali);

            const n = listaGiocatori.length;
            const base = Math.floor(golTotali / n);
            const resto = golTotali % n;

            datiMarcatori.forEach(g => {
                mappaGol[g.nome] = base;
            });

            if (resto === 1) {
                mappaGol[datiMarcatori[0].nome] += 1;
            } else if (resto === 2) {
                if (n === 2) {
                    mappaGol[datiMarcatori[0].nome] += 1;
                    mappaGol[datiMarcatori[1].nome] += 1;
                } else if (n >= 3) {
                    mappaGol[datiMarcatori[0].nome] += 1;
                    mappaGol[datiMarcatori[1].nome] += 1;
                }
            }

            return mappaGol;
        }

        document.getElementById('btn-salva-partita').addEventListener('click', async () => {
            const modalita = document.getElementById('admin-modalita').value;
            const data = document.getElementById('data-partita').value;

            const selectsSq1 = document.querySelectorAll('.select-sq1');
            const inputsGolSq1 = document.querySelectorAll('.gol-sq1');
            const selectsSq2 = document.querySelectorAll('.select-sq2');
            const inputsGolSq2 = document.querySelectorAll('.gol-sq2');

            const inputTotaleSq1 = parseInt(document.getElementById('totale-gol-sq1').value) || 0;
            const inputTotaleSq2 = parseInt(document.getElementById('totale-gol-sq2').value) || 0;

            const sq1Giocatori = [], sq2Giocatori = [];
            let sommaGolSingoliSq1 = 0, sommaGolSingoliSq2 = 0;
            const golIndividualiManuali = {};

            for (let i = 0; i < selectsSq1.length; i++) {
                const g1 = selectsSq1[i].value;
                const g2 = selectsSq2[i].value;
                const gol1 = parseInt(inputsGolSq1[i].value) || 0;
                const gol2 = parseInt(inputsGolSq2[i].value) || 0;

                if (g1) {
                    sq1Giocatori.push(g1);
                    sommaGolSingoliSq1 += gol1;
                    if (gol1 > 0) golIndividualiManuali[g1] = gol1;
                }
                if (g2) {
                    sq2Giocatori.push(g2);
                    sommaGolSingoliSq2 += gol2;
                    if (gol2 > 0) golIndividualiManuali[g2] = gol2;
                }
            }

            if (sq1Giocatori.length === 0 || sq2Giocatori.length === 0) {
                alert("Seleziona almeno un giocatore per squadra!");
                return;
            }

            let golSq1 = 0;
            let mapGolSq1 = {};
            if (sommaGolSingoliSq1 > 0) {
                golSq1 = sommaGolSingoliSq1;
                sq1Giocatori.forEach(g => { mapGolSq1[g] = golIndividualiManuali[g] || 0; });
            } else {
                golSq1 = inputTotaleSq1;
                mapGolSq1 = await distribuisciGolAutomatici(sq1Giocatori, inputTotaleSq1);
            }

            let golSq2 = 0;
            let mapGolSq2 = {};
            if (sommaGolSingoliSq2 > 0) {
                golSq2 = sommaGolSingoliSq2;
                sq2Giocatori.forEach(g => { mapGolSq2[g] = golIndividualiManuali[g] || 0; });
            } else {
                golSq2 = inputTotaleSq2;
                mapGolSq2 = await distribuisciGolAutomatici(sq2Giocatori, inputTotaleSq2);
            }

            const golIndividualiFinali = { ...mapGolSq1, ...mapGolSq2 };

            const mappaImportanza = { "1vs1": 20, "2vs2": 40, "3vs3": 60 };
            const I = mappaImportanza[modalita];

            let sommaPuntiSq1 = 0, sommaPuntiSq2 = 0;
            const datiSq1 = [], datiSq2 = [];

            for (const nome of sq1Giocatori) {
                const docSnap = await getDoc(doc(db, "giocatori", `fifa_24_wfer_${nome}`));
                const p = docSnap.exists() ? docSnap.data().punti : 1000;
                datiSq1.push({ nome, punti: p });
                sommaPuntiSq1 += p;
            }

            for (const nome of sq2Giocatori) {
                const docSnap = await getDoc(doc(db, "giocatori", `fifa_24_wfer_${nome}`));
                const p = docSnap.exists() ? docSnap.data().punti : 1000;
                datiSq2.push({ nome, punti: p });
                sommaPuntiSq2 += p;
            }

            const mediaSq1 = sommaPuntiSq1 / datiSq1.length;
            const mediaSq2 = sommaPuntiSq2 / datiSq2.length;
            const dr = mediaSq1 - mediaSq2;
            const We1 = 1 / (Math.pow(10, -dr / 600) + 1);
            const We2 = 1 - We1;

            let W1 = 0.5, W2 = 0.5;
            if (golSq1 > golSq2) { W1 = 1.0; W2 = 0.0; }
            else if (golSq2 > golSq1) { W1 = 0.0; W2 = 1.0; }

            const scarto = Math.abs(golSq1 - golSq2);
            let G = 1.0;
            if (scarto === 2) G = 1.5;
            else if (scarto >= 3) G = (11 + scarto) / 8;

            const deltaSq1 = Math.round((I * (W1 - We1) * G) * 10) / 10;
            const deltaSq2 = Math.round((I * (W2 - We2) * G) * 10) / 10;

            for (const item of datiSq1) {
                const nuoviPunti = Math.round((item.punti + deltaSq1) * 10) / 10;
                await setDoc(doc(db, "giocatori", `fifa_24_wfer_${item.nome}`), {
                    gioco: "fifa_24",
                    sistema: "wfer",
                    nome: item.nome,
                    punti: nuoviPunti,
                    ultimaVariazione: deltaSq1
                });
            }

            for (const item of datiSq2) {
                const nuoviPunti = Math.round((item.punti + deltaSq2) * 10) / 10;
                await setDoc(doc(db, "giocatori", `fifa_24_wfer_${item.nome}`), {
                    gioco: "fifa_24",
                    sistema: "wfer",
                    nome: item.nome,
                    punti: nuoviPunti,
                    ultimaVariazione: deltaSq2
                });
            }

            for (const [nome, golFatti] of Object.entries(golIndividualiFinali)) {
                const refM = doc(db, "marcatori", `fifa_24_${nome}`);
                const snapM = await getDoc(refM);
                const attuali = snapM.exists() ? snapM.data().gol : 0;
                await setDoc(refM, { gioco: "fifa_24", nome, gol: attuali + golFatti });
            }

            await addDoc(collection(db, "partite"), {
                gioco: "fifa_24",
                modalita,
                importanza: I,
                data,
                squadra1: sq1Giocatori.join(', '),
                gol1: golSq1,
                squadra2: sq2Giocatori.join(', '),
                gol2: golSq2,
                deltaSq1,
                deltaSq2,
                listaSq1: sq1Giocatori,
                listaSq2: sq2Giocatori,
                golMap: golIndividualiFinali,
                timestamp: Date.now()
            });

            alert(`✅ Partita registrata!\nSquadra 1: ${golSq1} gol (${deltaSq1 >= 0 ? '+' : ''}${deltaSq1} pt)\nSquadra 2: ${golSq2} gol (${deltaSq2 >= 0 ? '+' : ''}${deltaSq2} pt)`);
            generaGrigliaForm();
        });

        document.getElementById('btn-salva-giocatore').addEventListener('click', async () => {
            const nome = document.getElementById('nome-giocatore').value.trim();
            const punti = parseFloat(document.getElementById('punti-giocatore').value);

            if (nome && !isNaN(punti)) {
                await setDoc(doc(db, "giocatori", `fifa_24_wfer_${nome}`), {
                    gioco: "fifa_24",
                    sistema: "wfer",
                    nome,
                    punti,
                    ultimaVariazione: 0
                });
                alert(`Giocatore "${nome}" salvato!`);
                document.getElementById('nome-giocatore').value = '';
                document.getElementById('punti-giocatore').value = '';
                await caricaListaGiocatori();
                generaGrigliaForm();
            }
        });
    </script>
</body>
</html>
