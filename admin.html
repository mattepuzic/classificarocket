<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Rocket League</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1e293b;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .box-modalita {
            background: #0f172a;
            border: 2px solid #38bdf8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        /* Layout a Colonne Affiancate */
        .squadre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .squadre-grid { grid-template-columns: 1fr; }
        }

        .squadra-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .box-sezione {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }
        .giocatore-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .giocatore-row select { flex: 2; }
        .giocatore-row input { flex: 1; }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #38bdf8;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-azione {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-green { background-color: #10b981; }
        .btn-green:hover { background-color: #059669; }
        .btn-blue { background-color: #3b82f6; }
        .btn-blue:hover { background-color: #2563eb; }
        .btn-orange { background-color: #f59e0b; }
        .btn-orange:hover { background-color: #d97706; }
        
        hr.divisore-admin {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center;">⚙️ Pannello Admin Rocket League</h1>

    <div class="admin-container">
        
        <h2>🚀 1. Registra Nuova Partita</h2>
        
        <div class="box-modalita">
            <div class="form-group">
                <label style="color:#fff; font-size:1.1rem;">🎮 Seleziona la Modalità:</label>
                <select id="modalita-selezionata">
                    <option value="1vs1">1 vs 1 (Importanza: 20)</option>
                    <option value="1vs2">1 vs 2 (Importanza: 30 | Handicap: +200 pt)</option>
                    <option value="2vs1">2 vs 1 (Importanza: 30 | Handicap: +200 pt)</option>
                    <option value="2vs2" selected>2 vs 2 (Importanza: 40)</option>
                    <option value="2vs3">2 vs 3 (Importanza: 50 | Handicap: +150 pt)</option>
                    <option value="3vs2">3 vs 2 (Importanza: 50 | Handicap: +150 pt)</option>
                    <option value="3vs3">3 vs 3 (Importanza: 60)</option>
                </select>
            </div>
        </div>

        <form id="form-partita">
            <div class="squadre-grid">
                <div class="squadra-box">
                    <h3>🔵 Squadra 1</h3>
                    <div class="form-group" id="f-sq1-g1">
                        <label>Giocatore 1 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq1-g1" required></select>
                            <input type="number" id="gol-sq1-g1" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group" id="f-sq1-g2">
                        <label>Giocatore 2 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq1-g2"></select>
                            <input type="number" id="gol-sq1-g2" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group" id="f-sq1-g3">
                        <label>Giocatore 3 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq1-g3"></select>
                            <input type="number" id="gol-sq1-g3" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                </div>

                <div class="squadra-box">
                    <h3>🔴 Squadra 2</h3>
                    <div class="form-group" id="f-sq2-g1">
                        <label>Giocatore 1 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq2-g1" required></select>
                            <input type="number" id="gol-sq2-g1" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group" id="f-sq2-g2">
                        <label>Giocatore 2 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq2-g2"></select>
                            <input type="number" id="gol-sq2-g2" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group" id="f-sq2-g3">
                        <label>Giocatore 3 e Gol:</label>
                        <div class="giocatore-row">
                            <select id="sq2-g3"></select>
                            <input type="number" id="gol-sq2-g3" placeholder="Gol" min="0" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-azione btn-green">💾 Salva Partita</button>
        </form>

        <hr class="divisore-admin">

        <h2>✏️ 2. Modifica Giocatore Esistente</h2>
        <div class="box-sezione">
            <div class="form-group">
                <label>Seleziona Giocatore da Modificare:</label>
                <select id="select-modifica-giocatore"><option value="">-- Seleziona Giocatore --</option></select>
            </div>
            <div class="form-group">
                <label>Nome Giocatore:</label>
                <input type="text" id="edit-nome" placeholder="Nome">
            </div>
            <div class="form-group">
                <label>Punti WFER Attuali:</label>
                <input type="number" id="edit-punti" step="0.1" placeholder="Punti">
            </div>
            <div class="form-group">
                <label>Gol Totali Marcatori:</label>
                <input type="number" id="edit-gol" min="0" placeholder="Gol Totali">
            </div>
            <button id="btn-aggiorna-giocatore" type="button" class="btn-azione btn-orange">✏️ Aggiorna Dati Giocatore</button>
        </div>

        <hr class="divisore-admin">

        <h2>➕ 3. Aggiungi Nuovo Giocatore</h2>
        <div class="box-sezione">
            <div class="form-group">
                <label>Nome Nuovo Giocatore:</label>
                <input type="text" id="nuovo-nome" placeholder="Es. Mario">
            </div>
            <div class="form-group">
                <label>Punti Iniziali (Default: 1000):</label>
                <input type="number" id="nuovo-punti" value="1000" step="0.1">
            </div>
            <div class="form-group">
                <label>Gol Iniziali (Default: 0):</label>
                <input type="number" id="nuovo-gol" value="0" min="0">
            </div>
            <button id="btn-crea-giocatore" type="button" class="btn-azione btn-blue">➕ Aggiungi Giocatore</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqdkXgmsURF8MGchtfRJnODJz-olwYfw8",
            authDomain: "classifica-a16c1.firebaseapp.com",
            projectId: "classifica-a16c1",
            storageBucket: "classifica-a16c1.firebasestorage.app",
            messagingSenderId: "724863537613",
            appId: "1:724863537613:web:5c41a3eef6aa6adf7b3484",
            measurementId: "G-MM9P5H2LM5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaGiocatori = [];
        let listaMarcatori = [];

        const modeSel = document.getElementById('modalita-selezionata');

        function aggiornaInterfaccia() {
            const mode = modeSel.value;
            const [n1, n2] = mode.split('vs').map(Number);

            for (let i = 1; i <= 3; i++) {
                const el1 = document.getElementById(`f-sq1-g${i}`);
                const sel1 = document.getElementById(`sq1-g${i}`);
                if (el1) {
                    el1.style.display = i <= n1 ? 'block' : 'none';
                    sel1.required = i <= n1;
                }

                const el2 = document.getElementById(`f-sq2-g${i}`);
                const sel2 = document.getElementById(`sq2-g${i}`);
                if (el2) {
                    el2.style.display = i <= n2 ? 'block' : 'none';
                    sel2.required = i <= n2;
                }
            }
        }
        modeSel.addEventListener('change', aggiornaInterfaccia);

        async function popolaDati() {
            try {
                // Legge i giocatori registrati con fifa_24
                const qG = query(collection(db, "giocatori"), where("gioco", "==", "fifa_24"));
                const snapG = await getDocs(qG);
                listaGiocatori = [];
                snapG.forEach(d => {
                    const data = d.data();
                    data.idDoc = d.id;
                    listaGiocatori.push(data);
                });

                // Legge i marcatori
                const qM = query(collection(db, "marcatori"), where("gioco", "==", "fifa_24"));
                const snapM = await getDocs(qM);
                listaMarcatori = [];
                snapM.forEach(d => {
                    const data = d.data();
                    data.idDoc = d.id;
                    listaMarcatori.push(data);
                });

                const selectsPartita = ['sq1-g1', 'sq1-g2', 'sq1-g3', 'sq2-g1', 'sq2-g2', 'sq2-g3'];
                selectsPartita.forEach(sId => {
                    const el = document.getElementById(sId);
                    if (el) {
                        el.innerHTML = '<option value="">-- Seleziona --</option>';
                        listaGiocatori.forEach(g => {
                            el.innerHTML += `<option value="${g.nome}">${g.nome} (${g.punti} pt)</option>`;
                        });
                    }
                });

                const selectMod = document.getElementById('select-modifica-giocatore');
                selectMod.innerHTML = '<option value="">-- Seleziona Giocatore --</option>';
                listaGiocatori.forEach(g => {
                    selectMod.innerHTML += `<option value="${g.nome}">${g.nome}</option>`;
                });

                aggiornaInterfaccia();
            } catch (e) {
                console.error("Errore caricamento dati Firebase:", e);
            }
        }

        document.getElementById('select-modifica-giocatore').addEventListener('change', (e) => {
            const nomeSel = e.target.value;
            const gObj = listaGiocatori.find(g => g.nome === nomeSel);
            const mObj = listaMarcatori.find(m => m.nome === nomeSel);

            if (gObj) {
                document.getElementById('edit-nome').value = gObj.nome;
                document.getElementById('edit-punti').value = gObj.punti;
                document.getElementById('edit-gol').value = mObj ? mObj.gol : 0;
            } else {
                document.getElementById('edit-nome').value = '';
                document.getElementById('edit-punti').value = '';
                document.getElementById('edit-gol').value = '';
            }
        });

        document.getElementById('btn-aggiorna-giocatore').addEventListener('click', async () => {
            const nomeVecchio = document.getElementById('select-modifica-giocatore').value;
            if (!nomeVecchio) return alert("Seleziona prima un giocatore!");

            const nuovoNome = document.getElementById('edit-nome').value.trim();
            const nuoviPunti = parseFloat(document.getElementById('edit-punti').value);
            const nuoviGol = parseInt(document.getElementById('edit-gol').value);

            if (!nuovoNome || isNaN(nuoviPunti) || isNaN(nuoviGol)) {
                return alert("Compila tutti i campi correttamente!");
            }

            const gObj = listaGiocatori.find(g => g.nome === nomeVecchio);
            const mObj = listaMarcatori.find(m => m.nome === nomeVecchio);

            if (gObj) {
                await updateDoc(doc(db, "giocatori", gObj.idDoc), {
                    nome: nuovoNome,
                    punti: nuoviPunti,
                    gioco: "fifa_24"
                });
            }

            if (mObj) {
                await updateDoc(doc(db, "marcatori", mObj.idDoc), {
                    nome: nuovoNome,
                    gol: nuoviGol,
                    gioco: "fifa_24"
                });
            } else {
                await addDoc(collection(db, "marcatori"), {
                    gioco: "fifa_24",
                    nome: nuovoNome,
                    gol: nuoviGol
                });
            }

            alert("Giocatore aggiornato con successo!");
            location.reload();
        });

        document.getElementById('btn-crea-giocatore').addEventListener('click', async () => {
            const nome = document.getElementById('nuovo-nome').value.trim();
            const punti = parseFloat(document.getElementById('nuovo-punti').value) || 1000;
            const gol = parseInt(document.getElementById('nuovo-gol').value) || 0;

            if (!nome) return alert("Inserisci il nome del nuovo giocatore!");

            if (listaGiocatori.some(g => g.nome.toLowerCase() === nome.toLowerCase())) {
                return alert("Esiste già un giocatore con questo nome!");
            }

            await addDoc(collection(db, "giocatori"), {
                gioco: "fifa_24",
                nome: nome,
                punti: punti,
                ultimaVariazione: 0
            });

            await addDoc(collection(db, "marcatori"), {
                gioco: "fifa_24",
                nome: nome,
                gol: gol
            });

            alert(`Giocatore "${nome}" aggiunto con successo!`);
            location.reload();
        });

        function calcolaPunti(sq1Objs, sq2Objs, gol1, gol2, mode) {
            const num1 = sq1Objs.length;
            const num2 = sq2Objs.length;

            const me1Reale = sq1Objs.reduce((a, g) => a + g.punti, 0) / num1;
            const me2Reale = sq2Objs.reduce((a, g) => a + g.punti, 0) / num2;

            let I = 40, H1 = 0, H2 = 0;

            switch(mode) {
                case "1vs1": I = 20; break;
                case "1vs2": I = 30; H2 = 200; break;
                case "2vs1": I = 30; H1 = 200; break;
                case "2vs2": I = 40; break;
                case "2vs3": I = 50; H2 = 150; break;
                case "3vs2": I = 50; H1 = 150; break;
                case "3vs3": I = 60; break;
            }

            const me1Virtuale = me1Reale + H1;
            const me2Virtuale = me2Reale + H2;

            const diff = me2Virtuale - me1Virtuale;
            const We1 = 1 / (1 + Math.pow(10, diff / 600));
            const We2 = 1 - We1;

            let W1 = 0.5, W2 = 0.5;
            if (gol1 > gol2) { W1 = 1; W2 = 0; }
            else if (gol2 > gol1) { W1 = 0; W2 = 1; }

            const deltaSq1 = Math.round((I * (W1 - We1)) * 10) / 10;
            const deltaSq2 = Math.round((I * (W2 - We2)) * 10) / 10;

            return { deltaSq1, deltaSq2 };
        }

        document.getElementById('form-partita').addEventListener('submit', async (e) => {
            e.preventDefault();

            const mode = modeSel.value;
            const [n1, n2] = mode.split('vs').map(Number);

            const nomiSq1 = [];
            const golGiocatoriSq1 = [];
            let gol1 = 0;

            for (let i = 1; i <= n1; i++) {
                const valNome = document.getElementById(`sq1-g${i}`).value;
                const valGol = parseInt(document.getElementById(`gol-sq1-g${i}`).value) || 0;
                if (valNome) {
                    nomiSq1.push(valNome);
                    golGiocatoriSq1.push({ nome: valNome, gol: valGol });
                    gol1 += valGol;
                }
            }

            const nomiSq2 = [];
            const golGiocatoriSq2 = [];
            let gol2 = 0;

            for (let i = 1; i <= n2; i++) {
                const valNome = document.getElementById(`sq2-g${i}`).value;
                const valGol = parseInt(document.getElementById(`gol-sq2-g${i}`).value) || 0;
                if (valNome) {
                    nomiSq2.push(valNome);
                    golGiocatoriSq2.push({ nome: valNome, gol: valGol });
                    gol2 += valGol;
                }
            }

            const sq1Objs = listaGiocatori.filter(g => nomiSq1.includes(g.nome));
            const sq2Objs = listaGiocatori.filter(g => nomiSq2.includes(g.nome));

            const res = calcolaPunti(sq1Objs, sq2Objs, gol1, gol2, mode);
            const oggi = new Date().toISOString().split('T')[0];

            const golMap = {};
            [...golGiocatoriSq1, ...golGiocatoriSq2].forEach(item => {
                golMap[item.nome] = item.gol;
            });

            await addDoc(collection(db, "partite"), {
                gioco: "fifa_24",
                squadra1: nomiSq1.join(", "),
                squadra2: nomiSq2.join(", "),
                listaSq1: nomiSq1,
                listaSq2: nomiSq2,
                gol1, gol2,
                golMap: golMap,
                deltaSq1: res.deltaSq1,
                deltaSq2: res.deltaSq2,
                modalita: mode,
                data: oggi,
                timestamp: Date.now()
            });

            for (const g of sq1Objs) {
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: Math.round((g.punti + res.deltaSq1) * 10) / 10,
                    ultimaVariazione: res.deltaSq1
                });
            }
            for (const g of sq2Objs) {
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: Math.round((g.punti + res.deltaSq2) * 10) / 10,
                    ultimaVariazione: res.deltaSq2
                });
            }

            const tuttiGol = [...golGiocatoriSq1, ...golGiocatoriSq2];
            for (const item of tuttiGol) {
                if (item.gol > 0) {
                    const mObj = listaMarcatori.find(m => m.nome === item.nome);
                    if (mObj) {
                        await updateDoc(doc(db, "marcatori", mObj.idDoc), {
                            gol: (mObj.gol || 0) + item.gol
                        });
                    } else {
                        await addDoc(collection(db, "marcatori"), {
                            gioco: "fifa_24",
                            nome: item.nome,
                            gol: item.gol
                        });
                    }
                }
            }

            alert(`Partita salvata con successo!\nRisultato: ${gol1} - ${gol2}\nDelta Sq1: ${res.deltaSq1} | Delta Sq2: ${res.deltaSq2}`);
            location.reload();
        });

        popolaDati();
    </script>
</body>
</html>
