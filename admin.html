<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Rocket League</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .squadra-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        .btn-salva {
            width: 100%;
            padding: 12px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-salva:hover { background-color: #059669; }
    </style>
</head>
<body>

    <h1>⚙️ Pannello Admin - Inserisci Partita</h1>

    <div class="admin-container">
        <form id="form-partita">
            
            <div class="squadra-box">
                <h3>🔵 Squadra 1</h3>
                <div class="form-group">
                    <label>Giocatore 1 (Obbligatorio):</label>
                    <select id="sq1-g1" required><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group">
                    <label>Giocatore 2 (Opzionale):</label>
                    <select id="sq1-g2"><option value="">-- Nessuno --</option></select>
                </div>
                <div class="form-group">
                    <label>Giocatore 3 (Opzionale):</label>
                    <select id="sq1-g3"><option value="">-- Nessuno --</option></select>
                </div>
                <div class="form-group">
                    <label>Gol Segnati Squadra 1:</label>
                    <input type="number" id="gol1" min="0" value="0" required>
                </div>
            </div>

            <div class="squadra-box">
                <h3>🔴 Squadra 2</h3>
                <div class="form-group">
                    <label>Giocatore 1 (Obbligatorio):</label>
                    <select id="sq2-g1" required><option value="">-- Seleziona --</option></select>
                </div>
                <div class="form-group">
                    <label>Giocatore 2 (Opzionale):</label>
                    <select id="sq2-g2"><option value="">-- Nessuno --</option></select>
                </div>
                <div class="form-group">
                    <label>Giocatore 3 (Opzionale):</label>
                    <select id="sq2-g3"><option value="">-- Nessuno --</option></select>
                </div>
                <div class="form-group">
                    <label>Gol Segnati Squadra 2:</label>
                    <input type="number" id="gol2" min="0" value="0" required>
                </div>
            </div>

            <button type="submit" class="btn-salva">💾 Registra Partita</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqdkXgmsURF8MGchtfRJnODJz-olwYfw8",
            authDomain: "classifica-a16c1.firebaseapp.com",
            projectId: "classifica-a16c1",
            storageBucket: "classifica-a16c1.firebasestorage.app",
            messagingSenderId: "724863537613",
            appId: "1:724863537613:web:5c41a3eef6aa6adf7b3484",
            measurementId: "G-MM9P5H2LM5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaGiocatori = [];

        async function popolaSelect() {
            const q = query(collection(db, "giocatori"), where("gioco", "==", "fifa_24"));
            const snap = await getDocs(q);
            
            snap.forEach(d => {
                const data = d.data();
                data.idDoc = d.id;
                listaGiocatori.push(data);
            });

            const selects = ['sq1-g1', 'sq1-g2', 'sq1-g3', 'sq2-g1', 'sq2-g2', 'sq2-g3'];
            selects.forEach(sId => {
                const el = document.getElementById(sId);
                listaGiocatori.forEach(g => {
                    el.innerHTML += `<option value="${g.nome}">${g.nome} (${g.punti} pt)</option>`;
                });
            });
        }

        // Algoritmo WFER con Media Punti e Handicap Virtuale (+200 per 1vs2, +150 per 2vs3)
        function calcolaDeltaPartita(sq1Objs, sq2Objs, gol1, gol2) {
            const num1 = sq1Objs.length;
            const num2 = sq2Objs.length;

            // Media Punti Reale
            const me1Reale = sq1Objs.reduce((a, g) => a + g.punti, 0) / num1;
            const me2Reale = sq2Objs.reduce((a, g) => a + g.punti, 0) / num2;

            let I = 40;
            let H1 = 0, H2 = 0;

            if (num1 === 1 && num2 === 1) {
                I = 20;
            } else if ((num1 === 1 && num2 === 2) || (num1 === 2 && num2 === 1)) {
                I = 30;
                if (num1 < num2) H2 = 200;
                else H1 = 200;
            } else if (num1 === 2 && num2 === 2) {
                I = 40;
            } else if ((num1 === 2 && num2 === 3) || (num1 === 3 && num2 === 2)) {
                I = 50;
                if (num1 < num2) H2 = 150;
                else H1 = 150;
            } else if (num1 === 3 && num2 === 3) {
                I = 60;
            }

            // Medie con Handicap Virtuale
            const me1Virtuale = me1Reale + H1;
            const me2Virtuale = me2Reale + H2;

            // Valore Atteso (We)
            const diff = me2Virtuale - me1Virtuale;
            const We1 = 1 / (1 + Math.pow(10, diff / 600));
            const We2 = 1 - We1;

            let W1 = 0.5, W2 = 0.5;
            if (gol1 > gol2) { W1 = 1; W2 = 0; }
            else if (gol2 > gol1) { W1 = 0; W2 = 1; }

            const deltaSq1 = Math.round((I * (W1 - We1)) * 10) / 10;
            const deltaSq2 = Math.round((I * (W2 - We2)) * 10) / 10;

            return { deltaSq1, deltaSq2, modalita: `${num1}vs${num2}` };
        }

        document.getElementById('form-partita').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nomiSq1 = [
                document.getElementById('sq1-g1').value,
                document.getElementById('sq1-g2').value,
                document.getElementById('sq1-g3').value
            ].filter(Boolean);

            const nomiSq2 = [
                document.getElementById('sq2-g1').value,
                document.getElementById('sq2-g2').value,
                document.getElementById('sq2-g3').value
            ].filter(Boolean);

            const gol1 = parseInt(document.getElementById('gol1').value);
            const gol2 = parseInt(document.getElementById('gol2').value);

            const sq1Objs = listaGiocatori.filter(g => nomiSq1.includes(g.nome));
            const sq2Objs = listaGiocatori.filter(g => nomiSq2.includes(g.nome));

            const calcolo = calcolaDeltaPartita(sq1Objs, sq2Objs, gol1, gol2);

            const oggi = new Date().toISOString().split('T')[0];

            await addDoc(collection(db, "partite"), {
                gioco: "fifa_24",
                squadra1: nomiSq1.join(", "),
                squadra2: nomiSq2.join(", "),
                listaSq1: nomiSq1,
                listaSq2: nomiSq2,
                gol1: gol1,
                gol2: gol2,
                deltaSq1: calcolo.deltaSq1,
                deltaSq2: calcolo.deltaSq2,
                modalita: calcolo.modalita,
                data: oggi,
                timestamp: Date.now()
            });

            for (const g of sq1Objs) {
                const nuovoPunteggio = Math.round((g.punti + calcolo.deltaSq1) * 10) / 10;
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: nuovoPunteggio,
                    ultimaVariazione: calcolo.deltaSq1
                });
            }

            for (const g of sq2Objs) {
                const nuovoPunteggio = Math.round((g.punti + calcolo.deltaSq2) * 10) / 10;
                await updateDoc(doc(db, "giocatori", g.idDoc), {
                    punti: nuovoPunteggio,
                    ultimaVariazione: calcolo.deltaSq2
                });
            }

            alert(`Partita salvata! Modalità: ${calcolo.modalita} | Delta Sq1: ${calcolo.deltaSq1} | Delta Sq2: ${calcolo.deltaSq2}`);
            location.reload();
        });

        popolaSelect();
    </script>
</body>
</html>
